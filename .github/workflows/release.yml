name: Auto Release on Version Change

on:
  push:
    branches:
      - main
      - master
    paths:
      - "*.user.js"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from userscript
        id: get_version
        run: |
          VERSION=$(grep -oP '@version\s+\K\S+' *.user.js | head -n 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          TAG="${{ steps.get_version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist, will create release."
          fi

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: ${{ steps.get_version.outputs.tag }}
          body: |
            自动发布版本 ${{ steps.get_version.outputs.version }}

            Greasy Fork 同步地址请使用本仓库 `*.user.js` 的 Raw 链接。
          files: "*.user.js"
          generate_release_notes: false
